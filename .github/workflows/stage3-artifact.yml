name: Stage3 Artifact Harness
on:
  workflow_dispatch:
jobs:
  artifact:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "stage3 artifact $(date -u +%FT%TZ)" > artifact.txt
      - uses: actions/upload-artifact@v4
        with:
          name: stage3-artifact
          path: artifact.txt
